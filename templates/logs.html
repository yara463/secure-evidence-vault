<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Logs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            padding: 30px;
            margin: 0;
        }

        .box {
            background: #1e293b;
            padding: 25px;
            border-radius: 16px;
        }

        h1 {
            margin-top: 0;
        }

        a {
            color: #60a5fa;
            text-decoration: none;
        }

        pre {
            white-space: pre-wrap;
            line-height: 1.8;
            color: #dbeafe;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>System Logs 📋</h1>
        <p><a href="/">Back to Home</a></p>

        {% if logs %}
            <pre>{% for log in logs %}{{ log }}{% endfor %}</pre>
        {% else %}
            <p>No logs found.</p>
        {% endif %}
    </div>
</body>
</html>
