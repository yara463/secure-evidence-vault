<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Secure Evidence Vault</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 18px;
            width: 360px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            margin-top: 0;
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #22c55e;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .error {
            color: #fca5a5;
            margin-top: 12px;
            text-align: center;
        }

        .info {
            color: #cbd5e1;
            font-size: 14px;
            margin-top: 15px;
            line-height: 1.7;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Login 🔐</h1>

        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <div class="info">
            Admin: admin / admin123<br>
            Investigator: investigator / invest123
        </div>
    </div>
</body>
</html>
